<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TurAventura - Reservas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/reservas.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg sticky-top shadow-sm">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <i class="fas fa-plane-departure me-2"></i>TurAventura
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-2">
          <li class="nav-item"><a class="nav-link" href="index.html#destinos">Destinos</a></li>
          <li class="nav-item"><a class="nav-link" href="planes.html">Paquetes</a></li>
          <li class="nav-item"><a class="nav-link" href="nosotros.html">Nosotros</a></li>
          <div class="ms-auto d-flex gap-2 align-items-center">
            <a id="btnReservar" class="btn btn-info" href="reservas.html">Reservar aquí</a>
            <button id="btnLogout" class="btn btn-logout">Cerrar sesión</button>
          </div>
        </ul>
      </div>
    </div>
  </nav>

  <!-- FORMULARIO -->
  <section class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-7">
          <div class="card shadow-lg p-4 border-0 rounded-4">

            <h2 class="text-center titulo-formulario mb-4">
              <i class="fas fa-plane-departure me-2"></i>Reserva tu experiencia
            </h2>

            <form id="formReserva">

              <div class="mb-3">
                <label class="form-label fw-semibold"><i class="fas fa-user me-2"></i>Nombre completo</label>
                <input type="text" id="nombre" class="form-control">
                <small class="text-danger" id="errorNombre"></small>
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold"><i class="fas fa-envelope me-2"></i>Correo electrónico</label>
                <input type="email" id="email" class="form-control">
                <small class="text-danger" id="errorEmail"></small>
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold"><i class="fas fa-map-marker-alt me-2"></i>Destino</label>
                <input type="text" id="destino" class="form-control" placeholder="Ej: Francia, Colombia...">
                <small class="text-danger" id="errorDestino"></small>
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold"><i class="fas fa-calendar-alt me-2"></i>Fecha de viaje</label>
                <input type="date" id="fecha" class="form-control">
                <small class="text-danger" id="errorFecha"></small>
              </div>

              <div class="mb-4">
                <label class="form-label fw-semibold"><i class="fas fa-users me-2"></i>Número de personas</label>
                <input type="number" id="personas" class="form-control" min="1">
                <small class="text-danger" id="errorPersonas"></small>
              </div>

              <button type="submit" class="btn btn-reservar w-100 py-2">
                <i class="fas fa-check-circle me-2"></i>Confirmar Reserva
              </button>

            </form>

            <!-- Mensaje éxito — empieza oculto con d-none -->
            <div id="mensajeExito" class="alert mt-3 d-none text-center"></div>

          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Solo form.js maneja el formulario (se eliminó reservas.js de aquí) -->
  <script src="js/form.js"></script>
  <script>
    // Redirigir si no está logueado
    if (localStorage.getItem("usuarioLogueado") !== "true") {
      window.location.href = "login.html";
    }

    // Cerrar sesión
    document.getElementById("btnLogout").addEventListener("click", function () {
      localStorage.removeItem("usuarioLogueado");
      localStorage.removeItem("nombreUsuario");
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
