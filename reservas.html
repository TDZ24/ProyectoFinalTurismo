<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TurAventura - Reservas</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <!-- Fuente -->
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700;800&display=swap" rel="stylesheet">

  <!-- CSS propio -->
  <link rel="stylesheet" href="reservas.css">
</head>

<body>

   <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-plane-departure me-2"></i>TurAventura
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-2">
                    <li class="nav-item"><a class="nav-link" href="index.html#destinos">Destinos</a></li>
                    <li class="nav-item"><a class="nav-link" href="planes.html">Paquetes</a></li>
                    <li class="nav-item"><a class="nav-link active" href="nosotros.html">Nosotros</a></li>

                </ul>
            </div>
        </div>
    </nav>

  <!-- SECCIÓN RESERVAS -->
  <section class="py-5">
    <div class="container">
      
      <div class="row justify-content-center">
        <div class="col-lg-7">

          <div class="card shadow-lg p-4 border-0 rounded-4">

            <h2 class="text-center section-title mb-4">
              Reserva tu experiencia con TurAventura
            </h2>

            <form id="formReserva">

              <!-- Nombre -->
              <div class="mb-3">
                <label class="form-label fw-semibold">
                  <i class="fas fa-user me-2"></i>Nombre completo
                </label>
                <input type="text" id="nombre" class="form-control">
                <small class="text-danger" id="errorNombre"></small>
              </div>

              <!-- Email -->
              <div class="mb-3">
                <label class="form-label fw-semibold">
                  <i class="fas fa-envelope me-2"></i>Correo electrónico
                </label>
                <input type="email" id="email" class="form-control">
                <small class="text-danger" id="errorEmail"></small>
              </div>

              <!-- Destino -->
              <div class="mb-3">
                <label class="form-label fw-semibold">
                  <i class="fas fa-map-marker-alt me-2"></i>Destino
                </label>
                <input type="text" id="destino" class="form-control">
                <small class="text-danger" id="errorDestino"></small>
              </div>

              <!-- Fecha -->
              <div class="mb-3">
                <label class="form-label fw-semibold">
                  <i class="fas fa-calendar-alt me-2"></i>Fecha de viaje
                </label>
                <input type="date" id="fecha" class="form-control">
                <small class="text-danger" id="errorFecha"></small>
              </div>

              <!-- Personas -->
              <div class="mb-4">
                <label class="form-label fw-semibold">
                  <i class="fas fa-users me-2"></i>Número de personas
                </label>
                <input type="number" id="personas" class="form-control">
                <small class="text-danger" id="errorPersonas"></small>
              </div>

              <button type="submit" class="btn btn-reservar w-100 py-2">
                Confirmar Reserva
              </button>

            </form>

            <!-- Mensaje éxito -->
            <div id="mensajeExito" class="alert mt-3 d-none text-center">
              Reserva realizada correctamente
            </div>

          </div>

        </div>
      </div>

    </div>
  </section>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Validación -->
  <script src="form.js"></script>
  <script>
  if(localStorage.getItem("usuarioLogueado") !== "true"){
      window.location.href = "login.html";
  }
</script>
</body>
</html>
