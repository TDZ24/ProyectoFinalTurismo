<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TurAventura - Acceso</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="login.css">


</head>

<body>

<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">
  <div class="col-md-5">
    <div class="login-card shadow-lg">

      <h3 class="text-center mb-4">
         <a class="navbar-brand" href="index.html">
        <i class="fas fa-plane-departure me-2"></i>TurAventura
      </a>
      </h3>

      <!-- Tabs -->
      <ul class="nav nav-tabs mb-3" id="authTabs">
        <li class="nav-item">
          <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#login">
            Iniciar Sesión
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-bs-toggle="tab" data-bs-target="#register">
            Registrarse
          </button>
        </li>
      </ul>

      <div class="tab-content">

        <!-- LOGIN -->
        <div class="tab-pane fade show active" id="login">
          <form id="loginForm">
            <div class="mb-3">
              <input type="email" id="loginEmail" class="form-control" placeholder="Correo">
            </div>
            <div class="mb-3">
              <input type="password" id="loginPass" class="form-control" placeholder="Contraseña">
            </div>
            <button type="submit" class="btn btn-main w-100">
              Ingresar
            </button>
          </form>
          <div id="loginMsg" class="text-center mt-3"></div>
        </div>

        <!-- REGISTRO -->
        <div class="tab-pane fade" id="register">
          <form id="registerForm">
            <div class="mb-3">
              <input type="text" id="regNombre" class="form-control" placeholder="Nombre completo">
            </div>
            <div class="mb-3">
              <input type="email" id="regEmail" class="form-control" placeholder="Correo">
            </div>
            <div class="mb-3">
              <input type="password" id="regPass" class="form-control" placeholder="Contraseña">
            </div>
            <button type="submit" class="btn btn-main w-100">
              Crear cuenta
            </button>
          </form>
          <div id="registerMsg" class="text-center mt-3"></div>
        </div>

      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="login.js"></script>

</body>
</html>
